<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - PSB Library</title>
    <link rel="stylesheet" href="feedback-style.css">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

    <div class="container">

        <header>
            <h1>Feedback Form</h1>
            <p>PSB Library Information Management Collection</p>
        </header>

        <nav>
            <a href="dashboard.html">Home</a>
            <a href="about.html">About IM</a>
            <a href="booklist.html">Books</a>
            <a href="gallery.html">Gallery</a>
            <a href="feedback.html">Feedback</a>
            <a href="contact.html">Contact</a>
        </nav>

        <section class="feedback-section">

            <div class="feedback-box">

                <h2>Send Us Your Feedback</h2>

                <form>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label>Comments</label>
                        <textarea rows="6" placeholder="Write your feedback here..." required></textarea>
                    </div>

                    <button type="submit">
                        <ion-icon name="send-outline"></ion-icon>
                        Submit Feedback
                    </button>

                </form>

            </div>

        </section>

        <footer>
            <p>&copy; 2026 PSB Library Information Management Website</p>
        </footer>

    </div>

</body>
</html>
